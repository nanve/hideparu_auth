<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hideparu 認証管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #c9a7e8;
    font-size: 22px;
    margin-bottom: 24px;
    letter-spacing: 2px;
  }

  /* ── ログイン画面 ── */
  #loginScreen {
    max-width: 360px;
    margin: 100px auto;
    background: #1a1a2e;
    border: 1px solid #3a3a5c;
    border-radius: 12px;
    padding: 32px;
  }
  #loginScreen h2 { text-align: center; color: #c9a7e8; margin-bottom: 20px; }
  #loginScreen input {
    width: 100%; padding: 10px;
    background: #111; border: 1px solid #444;
    border-radius: 6px; color: #fff;
    font-size: 14px; margin-bottom: 12px;
  }
  #loginScreen button {
    width: 100%; padding: 10px;
    background: #c9a7e8; color: #000;
    border: none; border-radius: 6px;
    font-size: 14px; font-weight: bold; cursor: pointer;
  }
  #loginError { color: #ff6b6b; font-size: 12px; text-align: center; margin-top: 8px; display: none; }

  /* ── メイン画面 ── */
  #mainScreen { display: none; max-width: 950px; margin: 0 auto; } /* 全体幅を少し広げました */

  .card {
    background: #1a1a2e;
    border: 1px solid #3a3a5c;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 {
    color: #c9a7e8; font-size: 15px;
    margin-bottom: 16px;
    border-bottom: 1px solid #3a3a5c;
    padding-bottom: 8px;
  }

  /* 追加フォームの幅調整 */
  .add-form {
    display: grid;
    /* 口座1.5, 名前1.2, Zinrai 0.8(半分近く), 期限1.0, 種別110px, ボタンauto */
    grid-template-columns: 1.5fr 1.2fr 0.8fr 1.2fr 110px auto; 
    gap: 8px;
    align-items: end;
  }
  .add-form label { font-size: 11px; color: #888; margin-bottom: 4px; display: block; }
  .add-form input {
    width: 100%; padding: 8px;
    background: #111; border: 1px solid #444;
    border-radius: 6px; color: #fff; font-size: 13px;
  }
  .btn-add {
    padding: 8px 16px;
    background: #c9a7e8; color: #000;
    border: none; border-radius: 6px;
    font-weight: bold; cursor: pointer;
    white-space: nowrap; font-size: 13px;
  }
  .btn-add:hover { background: #b894d4; }

  /* 検索バー */
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
  }
  .search-bar input {
    flex: 1; padding: 8px 12px;
    background: #111; border: 1px solid #444;
    border-radius: 6px; color: #fff; font-size: 13px;
    outline: none;
  }
  .search-bar input:focus { border-color: #c9a7e8; }
  .search-bar select {
    padding: 8px 10px;
    background: #111; border: 1px solid #444;
    border-radius: 6px; color: #fff; font-size: 13px;
    cursor: pointer; outline: none;
  }
  .search-bar select:focus { border-color: #c9a7e8; }
  .search-count { font-size: 12px; color: #666; white-space: nowrap; }

  /* テーブルの列幅調整 */
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th {
    background: #111; color: #888;
    padding: 8px 12px; text-align: left;
    font-weight: normal; font-size: 11px;
    cursor: pointer; user-select: none;
  }
  th:hover { color: #c9a7e8; }
  th .sort-icon { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-icon { opacity: 1; color: #c9a7e8; }
  td { padding: 10px 12px; border-bottom: 1px solid #2a2a3e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1f1f35; }

  .badge-on  { background: #1a4a1a; color: #4caf50; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
  .badge-off { background: #4a1a1a; color: #f44336; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
  .badge-exp { background: #4a3a1a; color: #ff9800; padding: 2px 10px; border-radius: 10px; font-size: 11px; }

  .btn-toggle { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 4px; }
  .btn-on  { background: #2e7d32; color: #fff; }
  .btn-off { background: #555; color: #fff; }
  .btn-del { background: #7d1a1a; color: #fff; padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }

  #saveStatus { text-align: center; font-size: 12px; margin-top: 8px; min-height: 18px; }
  .status-ok  { color: #4caf50; }
  .status-err { color: #f44336; }

  /* highlight */
  mark { background: #4a3a00; color: #ffd54f; border-radius: 2px; padding: 0 2px; }

  @media (max-width: 600px) {
    .add-form { grid-template-columns: 1fr 1fr; }
    .search-bar { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <h2>🔐 管理者ログイン</h2>
  <input type="password" id="loginPass" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
  <input type="password" id="loginToken" placeholder="Access Token（初回のみ）" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">ログイン</button>
  <div id="loginError">パスワードが違います</div>
</div>

<div id="mainScreen">
  <h1>🌸 HideparuRush 認証管理</h1>

  <div class="card">
    <h2>➕ 口座を追加</h2>
    <div class="add-form">
      <div>
        <label>口座番号</label>
        <input type="number" id="newId" placeholder="12345678">
      </div>
      <div>
        <label>名前</label>
        <input type="text" id="newName" placeholder="ユーザー名">
      </div>
      <div>
        <label>Zinrai ID</label>
        <input type="text" id="newZinrai" placeholder="zinrai_xxx">
      </div>
      <div>
        <label>有効期限</label>
        <input type="date" id="newExpire">
      </div>
      <div>
        <label>口座種別</label>
        <select id="newMode" style="width:100%;padding:8px;background:#111;border:1px solid #444;border-radius:6px;color:#fff;font-size:13px;">
          <option value="">-</option>
          <option value="LIVE">LIVE</option>
          <option value="DEMO">DEMO</option>
        </select>
      </div>
      <button class="btn-add" onclick="addAndSave()">追加</button>
    </div>
  </div>

  <div class="card">
    <h2>📋 口座一覧</h2>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 口座番号 / 名前 / Zinrai ID で検索..."
              oninput="renderTable()" onkeydown="if(event.key==='Escape'){this.value='';renderTable();}">
      <select id="filterStatus" onchange="renderTable()">
        <option value="all">すべて</option>
        <option value="active">有効のみ</option>
        <option value="inactive">無効のみ</option>
        <option value="expired">期限切れのみ</option>
      </select>
      <span class="search-count" id="searchCount"></span>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width:140px" onclick="sortBy('id')">口座番号<span class="sort-icon" id="sort-id">▲</span></th>
          <th style="width:130px" onclick="sortBy('name')">名前<span class="sort-icon" id="sort-name">▲</span></th>
          <th style="width:140px" onclick="sortBy('zinrai')">Zinrai ID<span class="sort-icon" id="sort-zinrai">▲</span></th>
          <th style="width:110px" onclick="sortBy('expire')">有効期限<span class="sort-icon" id="sort-expire">▲</span></th>
          <th style="width:85px">種別</th> <th style="width:75px">状態</th>
          <th style="width:130px">操作</th>
        </tr>
      </thead>
      <tbody id="accountTable"></tbody>
    </table>
  </div>

  <div id="saveStatus"></div>
</div>

<script>
const ADMIN_PASSWORD = "hide2026";
const GH_USER = "nanve";
const GH_REPO = "hideparu_auth";

let accounts = [];
let fileSHA  = "";
let sortKey  = "id";
let sortAsc  = true;

// ── ログイン ──────────────────────────────────────
function doLogin() {
  const pass = document.getElementById("loginPass").value;
  if (pass !== ADMIN_PASSWORD) {
    document.getElementById("loginError").style.display = "block";
    return;
  }
  const tok = document.getElementById("loginToken").value.trim();
  if (tok) localStorage.setItem("ghToken", tok);
  if (!localStorage.getItem("ghToken")) {
    document.getElementById("loginError").textContent = "Tokenを入力してください";
    document.getElementById("loginError").style.display = "block";
    return;
  }
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainScreen").style.display  = "block";
  loadFromGitHub();
}

// ── ソート ────────────────────────────────────────
function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  ["id","name","zinrai","expire"].forEach(k => {
    const el = document.getElementById("sort-" + k);
    const th = el.parentElement;
    if (k === sortKey) {
      el.textContent = sortAsc ? "▲" : "▼";
      th.classList.add("sorted");
    } else {
      el.textContent = "▲";
      th.classList.remove("sorted");
    }
  });
  renderTable();
}

// ── フィルタ・描画 ────────────────────────────────
function renderTable() {
  const q      = document.getElementById("searchInput").value.trim().toLowerCase();
  const filter = document.getElementById("filterStatus").value;
  const today  = new Date().toISOString().slice(0,10).replace(/-/g,"/");
  const tbody  = document.getElementById("accountTable");
  tbody.innerHTML = "";

  let filtered = accounts.filter((acc, origIdx) => {
    acc._origIdx = origIdx;
    if (q) {
      const hit = String(acc.id).includes(q)
               || (acc.name   || "").toLowerCase().includes(q)
               || (acc.zinrai || "").toLowerCase().includes(q)
               || (acc.mode   || "").toLowerCase().includes(q);
      if (!hit) return false;
    }
    const expired = acc.expire && acc.expire.replace(/-/g,"/") < today;
    if (filter === "active"   && (!acc.active || expired)) return false;
    if (filter === "inactive" && acc.active)               return false;
    if (filter === "expired"  && !expired)                 return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortKey] ?? "";
    let vb = b[sortKey] ?? "";
    if (sortKey === "id") { va = Number(va); vb = Number(vb); }
    else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    if (va < vb) return sortAsc ? -1 :  1;
    if (va > vb) return sortAsc ?  1 : -1;
    return 0;
  });

  document.getElementById("searchCount").textContent =
    `${filtered.length} / ${accounts.length} 件`;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#555;padding:20px;">該当なし</td></tr>`;
    return;
  }

  filtered.forEach(acc => {
    const i = acc._origIdx;
    const expired = acc.expire && acc.expire.replace(/-/g,"/") < today;
    let badge = "";
    if (!acc.active)  badge = `<span class="badge-off">無効</span>`;
    else if (expired) badge = `<span class="badge-exp">期限切れ</span>`;
    else              badge = `<span class="badge-on">有効</span>`;

    const hl = (text) => {
      if (!q || !text) return text || "-";
      return String(text).replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi"),
        "<mark>$1</mark>");
    };

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${hl(acc.id)}</td>
      <td>${hl(acc.name)}</td>
      <td>${hl(acc.zinrai)}</td>
      <td>${acc.expire || "-"}</td>
      <td>${modeBadge(acc.mode)}</td>
      <td>${badge}</td>
      <td>
        <button class="btn-toggle ${acc.active ? 'btn-on' : 'btn-off'}"
          onclick="toggleActive(${i})">${acc.active ? "有効" : "無効"}</button>
        <button class="btn-del" onclick="deleteAccount(${i})">削除</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

// ── 口座追加 ──────────────────────────────────────
async function addAndSave() {
  const id     = parseInt(document.getElementById("newId").value);
  const name   = document.getElementById("newName").value.trim();
  const zinrai = document.getElementById("newZinrai").value.trim();
  const expire = document.getElementById("newExpire").value.replace(/-/g,"/");
  const mode   = document.getElementById("newMode").value;
  if (!id) { alert("口座番号を入力してください"); return; }
  if (accounts.find(a => a.id === id)) { alert("この口座番号は既に登録されています"); return; }
  accounts.push({ id, name, zinrai, expire, mode, active: true });
  renderTable();
  document.getElementById("newId").value     = "";
  document.getElementById("newName").value   = "";
  document.getElementById("newZinrai").value = "";
  document.getElementById("newMode").value   = "";
  await saveToGitHub();
}

async function toggleActive(i) {
  accounts[i].active = !accounts[i].active;
  renderTable();
  await saveToGitHub();
}

async function deleteAccount(i) {
  if (!confirm(`口座番号 ${accounts[i].id} を削除しますか？`)) return;
  accounts.splice(i, 1);
  renderTable();
  await saveToGitHub();
}

async function loadFromGitHub() {
  const token = localStorage.getItem("ghToken") || "";
  try {
    const res = await fetch(
      `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/auth.json?ref=main`,
      { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" } }
    );
    if (res.status === 404) {
      fileSHA = ""; accounts = [];
      renderTable();
      showStatus("auth.json未作成 → 口座追加後に保存してください", true);
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    fileSHA = data.sha;
    const binary = atob(data.content.replace(/\n/g, ""));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const json = JSON.parse(new TextDecoder("utf-8").decode(bytes));
    accounts = json.accounts || [];
    renderTable();
    showStatus(`✅ 読み込み完了（${accounts.length}件）`, true);
  } catch(e) {
    showStatus("❌ 読み込み失敗: " + e.message, false);
  }
}

async function saveToGitHub() {
  const token = localStorage.getItem("ghToken") || "";
  const jsonStr = JSON.stringify({ accounts }, null, 2);
  const bytes = new TextEncoder().encode(jsonStr);
  let binary = "";
  bytes.forEach(b => binary += String.fromCharCode(b));
  const content = btoa(binary);
  try {
    const body = {
      message: `auth update ${new Date().toISOString()}`,
      content, branch: "main"
    };
    if (fileSHA) body.sha = fileSHA;
    const res = await fetch(
      `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/auth.json`,
      {
        method: "PUT",
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github.v3+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    fileSHA = data.content.sha;
    showStatus("✅ 保存完了！", true);
  } catch(e) {
    showStatus("❌ 保存失敗: " + e.message, false);
  }
}

function modeBadge(mode) {
  if (mode === "LIVE") return '<span style="background:#1a3a4a;color:#29b6f6;padding:2px 8px;border-radius:10px;font-size:11px;">LIVE</span>';
  if (mode === "DEMO") return '<span style="background:#3a3a1a;color:#ffee58;padding:2px 8px;border-radius:10px;font-size:11px;">DEMO</span>';
  return '<span style="color:#444;font-size:11px;">-</span>';
}

function showStatus(msg, ok) {
  const el = document.getElementById("saveStatus");
  el.textContent = msg;
  el.className = ok ? "status-ok" : "status-err";
}

const d = new Date();
d.setFullYear(d.getFullYear() + 1);
document.getElementById("newExpire").value = d.toISOString().slice(0,10);
</script>
</body>
</html>
